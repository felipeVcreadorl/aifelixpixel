bkit-scrollbar { width:3px; }::-webkit-scrollbar-track { background:var(--black); }::-webkit-scrollbar-thumb { background:var(--gold); }/* ═══════════════════════════════NAVIGATION═══════════════════════════════ */nav {position:fixed; top:0; left:0; right:0; z-index:500;display:flex; justify-content:space-between; align-items:center;padding:28px 60px;transition:all .4s ease;}nav.scrolled {background:rgba(3,3,4,0.92);backdrop-filter:blur(20px);padding:18px 60px;border-bottom:1px solid rgba(200,168,75,0.1);}.nav-logo {display:flex; flex-direction:column; gap:2px;}.nav-logo-main {font-family: var(--f-display);font-weight:900; font-style:italic;font-size:20px; letter-spacing:0.04em;background: linear-gradient(135deg, var(--gold-p), var(--gold), var(--gold-l));-webkit-background-clip:text; -webkit-text-fill-color:transparent;background-clip:text; line-height:1;}.nav-logo-sub {font-family: var(--f-cond);font-size:8px; font-weight:600;color:var(--neon); letter-spacing:.55em;text-transform:uppercase;}.nav-links {display:flex; gap:48px; list-style:none;align-items:center;}.nav-links a {font-family: var(--f-cond);font-size:13px; font-weight:600;color:var(--silver); text-decoration:none;letter-spacing:.2em; text-transform:uppercase;transition:color .3s;position:relative;}.nav-links a::after {content:''; position:absolute;bottom:-4px; left:0; right:0; height:1px;background:var(--neon); transform:scaleX(0);transition:transform .3s ease;}.nav-links a:hover { color:var(--white); }.nav-links a:hover::after { transform:scaleX(1); }.nav-cta {background: linear-gradient(135deg, var(--gold), var(--gold-l));color:var(--black) !important;padding:10px 28px;font-weight:800 !important;transition:all .3s !important;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}.nav-cta:hover {transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,168,75,0.4);}.nav-cta::after { display:none !important; }.nav-menu-btn {display:none;background:none; border:none; cursor:none;flex-direction:column; gap:5px; padding:8px;}.nav-menu-btn span {display:block; width:24px; height:1px;background:var(--white); transition:all .3s;}/* Mobile nav */.mobile-nav {display:none; position:fixed;inset:0; background:rgba(3,3,4,0.98);backdrop-filter:blur(20px);z-index:490; flex-direction:column;align-items:center; justify-content:center; gap:40px;}.mobile-nav.open { display:flex; }.mobile-nav a {font-family: var(--f-display);font-size:clamp(28px,6vw,48px);font-weight:700; color:var(--white);text-decoration:none; transition:color .3s;}.mobile-nav a:hover { color:var(--gold-l); }/* ═══════════════════════════════HERO — FULL SCREEN IMPACT═══════════════════════════════ */.hero {height:100vh; min-height:700px;display:flex; align-items:center;position:relative; overflow:hidden;}/* Animated background layers */.hero-bg-grid {position:absolute; inset:0;background-image:linear-gradient(rgba(200,168,75,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,0.035) 1px,transparent 1px);background-size:72px 72px;animation:gridDrift 40s linear infinite;}@keyframes gridDrift {from { transform:translate(0,0); }to { transform:translate(72px,72px); }}.hero-radial {position:absolute; inset:0;background:radial-gradient(ellipse 120% 70% at 50% -10%,rgba(200,168,75,0.14) 0%,transparent 55%),radial-gradient(ellipse 80% 80% at 90% 90%,rgba(0,232,90,0.05) 0%,transparent 50%),radial-gradient(ellipse 60% 60% at 5% 60%,rgba(168,180,188,0.05) 0%,transparent 50%);}/* Floating orbs */.hero-orb {position:absolute;border-radius:50%;pointer-events:none;}.orb-1 {width:600px; height:600px;top:-200px; right:-100px;background:radial-gradient(circle,rgba(200,168,75,0.06),transparent 70%);animation:orbFloat1 12s ease-in-out infinite;}.orb-2 {width:400px; height:400px;bottom:-100px; left:-50px;background:radial-gradient(circle,rgba(0,232,90,0.05),transparent 70%);animation:orbFloat2 15s ease-in-out infinite;}@keyframes orbFloat1 {0%,100% { transform:translate(0,0) scale(1 ap:10px;background:linear-gradient(135deg,var(--gold),var(--gold-l));color:var(--black); padding:18px 44px;font-family: var(--f-cond);font-weight:800; font-size:14px;letter-spacing:.25em; text-transform:uppercase;text-decoration:none; transition:all .3s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));}.btn-primary:hover {transform:translateY(-3px);box-shadow:0 16px 48px rgba(200,168,75,0.45);}.btn-ghost {display:inline-flex; align-items:center; gap:10px;border:1px solid rgba(255,255,255,0.2);color:var(--white); padding:17px 40px;font-family: var(--f-cond);font-weight:600; font-size:14px;letter-spacing:.25em; text-transform:uppercase;text-decoration:none; transition:all .3s;background:rgba(255,255,255,0.02);}.btn-ghost:hover {border-color:var(--neon);color:var(--neon);background:rgba(0,232,90,0.05);}.hero-scroll {position:absolute; bottom:40px; left:60px; z-index:2;display:flex; flex-direction:column; align-items:flex-start; gap:12px;animation:fadeUp 1s ease 1s both;}.scroll-indicator {display:flex; align-items:center; gap:12px;}.scroll-line {width:60px; height:1px;background:linear-gradient(90deg,var(--gold),transparent);animation:scrollPulse 2s ease-in-out infinite;}@keyframes scrollPulse {0%,100% { opacity:1; }50% { opacity:0.3; }}.scroll-text {font-family: var(--f-cond);font-size:10px; font-weight:600;color:var(--gray-l); letter-spacing:.4em;text-transform:uppercase;}/* Hero right — floating stats */.hero-stats {position:absolute; right:60px; top:50%;transform:translateY(-50%);display:flex; flex-direction:column; gap:24px;z-index:2;animation:fadeLeft .8s ease .8s both;}@keyframes fadeLeft {from { opacity:0; transform:translateY(-50%) translateX(30px); }to { opacity:1; transform:translateY(-50%) translateX(0); }}.hero-stat {text-align:right; padding:16px 0;border-right:2px solid transparent;padding-right:24px;transition:border-color .3s;}.hero-stat:hover { border-right-color:var(--gold); }.hero-stat-num {font-family: va ld-p),var(--gold));-webkit-background-clip:text; -webkit-text-fill-color:transparent;background-clip:text; font-style:italic;}.section-title .neon { color:var(--neon); }.section-desc {font-size:clamp(16px,1.6vw,20px);font-weight:300; color:var(--silver);max-width:560px; line-height:1.7;}/* Reveal animation */.reveal {opacity:0; transform:translateY(40px);transition:opacity .8s ease, transform .8s ease;}.reveal.visible { opacity:1; transform:translateY(0); }/* ═══════════════════════════════SECTION 1 — NOSOTROS / INTRO═══════════════════════════════ */.intro-section {background:var(--dark);border-top:1px solid rgba(200,168,75,0.08);border-bottom:1px solid rgba(200,168,75,0.08);}.intro-grid {display:grid; grid-template-columns:1fr 1fr; gap:100px;align-items:center;}.intro-left {}.intro-right {display:flex; flex-direction:column; gap:28px;}.intro-stat-card {padding:28px 32px;border:1px solid rgba(200,168,75,0.12);background:rgba(200,168,75,0.03);position:relative; overflow:hidden;transition:all .4s;}.intro-stat-card::before {content:'';position:absolute; top:0; left:0; right:0; height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0; transition:opacity .4s;}.intro-stat-card:hover { border-color:rgba(200,168,75,0.3); }.intro-stat-card:hover::before { opacity:1; }.intro-stat-num {font-family: var(--f-display);font-weight:700;font-size:clamp(36px,4vw,52px);line-height:1;background:linear-gradient(135deg,var(--gold-p),var(--gold));-webkit-background-clip:text; -webkit-text-fill-color:transparent;background-clip:text;}.intro-stat-label {font-family: var(--f-cond);font-size:13px; font-weight:600;color:var(--silver); letter-spacing:.2em;text-transform:uppercase; margin-top:6px;}.intro-stat-sub {font-size:14px; color:var(--gray-l);font-weight:300; margin-top:8px; line-height:1.5;}/* ═══════════════════════════════SECTION 2 — SERVICIOS═══════════════════════════════ */.services-section {}.services-header {display:grid; grid-template-columns:1f
